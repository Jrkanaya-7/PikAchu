<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PikAchu // CHAT</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #111111;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --text: #e8e8e8;
    --text-dim: #666;
    --text-dimmer: #3a3a3a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --online: #4ade80;
    --danger: #f87171;
    --radius: 3px;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── LOBBY ── */
#lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 2rem;
    gap: 0;
}

.lobby-header {
    margin-bottom: 3rem;
    text-align: center;
}

.lobby-title {
    font-family: 'Space Mono', monospace;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.03em;
    line-height: 1;
}

.lobby-title span {
    color: var(--accent);
}

.lobby-sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
    font-family: 'Space Mono', monospace;
}

.lobby-card {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 400px;
    padding: 2rem;
}

.lobby-card h2 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    font-family: 'Space Mono', monospace;
}

.field {
    margin-bottom: 1rem;
}

.field label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.4rem;
    font-family: 'Space Mono', monospace;
}

.field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 0.7rem 0.9rem;
    outline: none;
    transition: border-color 0.15s;
    border-radius: var(--radius);
}

.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--text-dimmer); }

.field input.code-input {
    text-transform: uppercase;
    font-size: 18px;
    letter-spacing: 0.2em;
    text-align: center;
}

.divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0;
    color: var(--text-dimmer);
    font-size: 11px;
    font-family: 'Space Mono', monospace;
}

.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
}

.btn {
    width: 100%;
    padding: 0.75rem 1rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    border-radius: var(--radius);
    transition: all 0.15s;
    letter-spacing: 0.02em;
}

.btn-primary {
    background: var(--accent);
    color: #111;
}

.btn-primary:hover { background: #d4eb30; }
.btn-primary:active { transform: scale(0.98); }

.btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    margin-top: 0.75rem;
}

.btn-secondary:hover { border-color: var(--text-dim); background: var(--surface2); }

#lobbyError {
    color: var(--danger);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    margin-top: 0.75rem;
    min-height: 1rem;
}

/* ── CHAT ── */
#chatScreen {
    display: none;
    flex-direction: column;
    height: 100vh;
}

.chat-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 1rem;
}

.chat-topbar-left {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.15s;
}

.back-btn:hover { border-color: var(--text-dim); color: var(--text); }

.room-info { display: flex; flex-direction: column; gap: 1px; }

.room-name-display {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
}

.room-code-display {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 0.4rem;
}

.copy-code {
    background: none;
    border: none;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    padding: 0;
    transition: opacity 0.15s;
}

.copy-code:hover { opacity: 0.7; }

.online-pill {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.25rem 0.6rem;
    border-radius: 99px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}

.online-pill:hover { border-color: var(--online); color: var(--online); }

.online-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--online);
    flex-shrink: 0;
}

/* chat body */
.chat-body {
    display: flex;
    flex: 1;
    overflow: hidden;
}

#messagesArea {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
    scroll-behavior: smooth;
}

#messagesArea::-webkit-scrollbar { width: 3px; }
#messagesArea::-webkit-scrollbar-track { background: transparent; }
#messagesArea::-webkit-scrollbar-thumb { background: var(--border); }

/* online sidebar */
#onlineSidebar {
    width: 200px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    flex-shrink: 0;
    display: none;
    flex-direction: column;
}

#onlineSidebar.open { display: flex; }

.sidebar-header {
    padding: 0.9rem 1rem 0.5rem;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

.online-user {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.55rem 1rem;
    font-size: 13px;
    color: var(--text);
    border-bottom: 1px solid var(--surface2);
}

.online-user-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--online);
    flex-shrink: 0;
}

.online-user-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.online-user.me .online-user-name {
    color: var(--accent);
    font-weight: 600;
}

/* messages */
.msg-group {
    display: flex;
    flex-direction: column;
    margin-top: 1rem;
}

.msg-group:first-child { margin-top: 0; }

.msg-meta {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    margin-bottom: 0.25rem;
}

.msg-author {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
}

.msg-author.is-me { color: var(--accent); }

.msg-time {
    font-size: 10px;
    color: var(--text-dimmer);
    font-family: 'Space Mono', monospace;
}

.msg-bubble {
    font-size: 14px;
    color: #ccc;
    line-height: 1.55;
    padding: 0.1rem 0;
    word-break: break-word;
}

.msg-system {
    font-size: 11px;
    color: var(--text-dimmer);
    font-family: 'Space Mono', monospace;
    text-align: center;
    margin: 0.75rem 0;
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.msg-system::before, .msg-system::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
}

/* input */
.chat-inputbar {
    padding: 0.9rem 1.25rem;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-shrink: 0;
}

.username-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
}

#msgInput {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    padding: 0.6rem 0.9rem;
    outline: none;
    border-radius: var(--radius);
    transition: border-color 0.15s;
}

#msgInput:focus { border-color: var(--accent); }
#msgInput::placeholder { color: var(--text-dimmer); }

.send-btn {
    background: var(--accent);
    border: none;
    color: #111;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 0.6rem 1.1rem;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
}

.send-btn:hover { background: #d4eb30; }
.send-btn:active { transform: scale(0.97); }

/* toast */
#toast {
    position: fixed;
    bottom: 5rem;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 0.5rem 1rem;
    border-radius: var(--radius);
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
}

#toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.loading-msg {
    text-align: center;
    color: var(--text-dimmer);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    margin: auto;
}

@media (max-width: 600px) {
    #onlineSidebar { width: 160px; }
    .lobby-card { padding: 1.5rem; }
}
</style>
</head>
<body>

<!-- ── LOBBY ── -->
<div id="lobby">
    <div class="lobby-header">
        <div class="lobby-title">Pik<span>Chat</span></div>
        <div class="lobby-sub">// real-time rooms, no accounts needed</div>
    </div>

    <div class="lobby-card">
        <h2>Get Started</h2>

        <div class="field">
            <label>Your username</label>
            <input type="text" id="usernameInput" placeholder="coolname123" maxlength="20" autocomplete="off" />
        </div>

        <div class="field">
            <label>Room code (join existing)</label>
            <input type="text" id="joinCodeInput" class="code-input" placeholder="ABCD12" maxlength="6" autocomplete="off"
                oninput="this.value=this.value.toUpperCase()" />
        </div>

        <button class="btn btn-primary" onclick="joinRoom()">Join Room</button>

        <div class="divider">or</div>

        <button class="btn btn-secondary" onclick="createRoom()">Create New Room</button>

        <div id="lobbyError"></div>
    </div>
</div>

<!-- ── CHAT ── -->
<div id="chatScreen">
    <div class="chat-topbar">
        <div class="chat-topbar-left">
            <button class="back-btn" onclick="leaveRoom()">← Leave</button>
            <div class="room-info">
                <div class="room-name-display" id="roomNameDisplay">Room</div>
                <div class="room-code-display">
                    CODE: <span id="roomCodeDisplay"></span>
                    <button class="copy-code" onclick="copyCode()">[copy]</button>
                </div>
            </div>
        </div>
        <button class="online-pill" onclick="toggleSidebar()" id="onlineCount">
            <div class="online-dot"></div>
            <span>0 online</span>
        </button>
    </div>

    <div class="chat-body">
        <div id="messagesArea">
            <div class="loading-msg">connecting...</div>
        </div>

        <div id="onlineSidebar">
            <div class="sidebar-header">Online</div>
            <div id="onlineList"></div>
        </div>
    </div>

    <div class="chat-inputbar">
        <span class="username-badge" id="userBadge"></span>
        <input type="text" id="msgInput" placeholder="say something..." maxlength="500"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}" />
        <button class="send-btn" onclick="sendMessage()">Send →</button>
    </div>
</div>

<div id="toast"></div>

<!-- ══ FIREBASE ══════════════════════════════════════════════════════════ -->
<!--
    SETUP INSTRUCTIONS:
    1. Go to https://console.firebase.google.com
    2. Create a new project (free)
    3. Add a Web App to it
    4. Copy your firebaseConfig and paste it below, replacing the placeholder
    5. In Firebase console → Realtime Database → Create database (start in test mode)
    6. Done!
-->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, set, onDisconnect, serverTimestamp, get, remove, off }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────────────────
const firebaseConfig = {
    apiKey: "AIzaSyCvn7O_EJhPaGxA4-uFJjv7CY6SMPqL7T4",
    authDomain: "pikachu-chat-e9f41.firebaseapp.com",
    databaseURL: "https://pikachu-chat-e9f41-default-rtdb.firebaseio.com",
    projectId: "pikachu-chat-e9f41",
    storageBucket: "pikachu-chat-e9f41.firebasestorage.app",
    messagingSenderId: "266899783053",
    appId: "1:266899783053:web:502dcba846a9171ed091c4"
};
// ─────────────────────────────────────────────────────────────────────────

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = null;
let currentRoom = null;
let presenceRef = null;
let messagesRef = null;
let onlineRef = null;
let msgListener = null;
let onlineListener = null;
let lastAuthor = null;
let lastMsgGroup = null;

// ── UTILS ─────────────────────────────────────────────────────────────────
function genCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

function setError(msg) {
    document.getElementById('lobbyError').textContent = msg;
}

// ── LOBBY ──────────────────────────────────────────────────────────────────
window.createRoom = async function() {
    const username = document.getElementById('usernameInput').value.trim();
    if (!username) { setError('Enter a username first.'); return; }
    if (username.length < 2) { setError('Username too short.'); return; }

    const code = genCode();
    currentUser = username;
    currentRoom = code;

    await set(ref(db, `rooms/${code}/meta`), {
        created: serverTimestamp(),
        createdBy: username
    });

    enterChat(code, username);
};

window.joinRoom = async function() {
    const username = document.getElementById('usernameInput').value.trim();
    const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();

    if (!username) { setError('Enter a username.'); return; }
    if (username.length < 2) { setError('Username too short.'); return; }
    if (!code || code.length !== 6) { setError('Enter a valid 6-character room code.'); return; }

    const snap = await get(ref(db, `rooms/${code}/meta`));
    if (!snap.exists()) { setError(`Room "${code}" not found.`); return; }

    currentUser = username;
    currentRoom = code;
    enterChat(code, username);
};

// ── CHAT ───────────────────────────────────────────────────────────────────
function enterChat(roomCode, username) {
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('chatScreen').style.display = 'flex';
    document.getElementById('roomNameDisplay').textContent = `#${roomCode}`;
    document.getElementById('roomCodeDisplay').textContent = roomCode;
    document.getElementById('userBadge').textContent = username + ':';

    setupPresence(roomCode, username);
    listenMessages(roomCode);
    listenOnline(roomCode);

    setTimeout(() => document.getElementById('msgInput').focus(), 100);
}

function setupPresence(roomCode, username) {
    const uid = username + '_' + Math.random().toString(36).slice(2, 7);
    presenceRef = ref(db, `rooms/${roomCode}/online/${uid}`);
    set(presenceRef, { name: username, joinedAt: serverTimestamp() });
    onDisconnect(presenceRef).remove();
}

function listenMessages(roomCode) {
    messagesRef = ref(db, `rooms/${roomCode}/messages`);
    document.getElementById('messagesArea').innerHTML = '';
    lastAuthor = null;
    lastMsgGroup = null;

    msgListener = onValue(messagesRef, snap => {
        if (!snap.exists()) return;
        const msgs = snap.val();
        const area = document.getElementById('messagesArea');
        area.innerHTML = '';
        lastAuthor = null;
        lastMsgGroup = null;

        Object.values(msgs).sort((a,b) => (a.ts||0)-(b.ts||0)).forEach(m => renderMessage(m));
        area.scrollTop = area.scrollHeight;
    });
}

function renderMessage(m) {
    const area = document.getElementById('messagesArea');

    if (m.system) {
        const el = document.createElement('div');
        el.className = 'msg-system';
        el.textContent = m.text;
        area.appendChild(el);
        lastAuthor = null;
        lastMsgGroup = null;
        return;
    }

    const isMe = m.author === currentUser;

    if (m.author !== lastAuthor) {
        const group = document.createElement('div');
        group.className = 'msg-group';

        const meta = document.createElement('div');
        meta.className = 'msg-meta';

        const author = document.createElement('span');
        author.className = 'msg-author' + (isMe ? ' is-me' : '');
        author.textContent = m.author;

        const time = document.createElement('span');
        time.className = 'msg-time';
        time.textContent = fmtTime(m.ts);

        meta.appendChild(author);
        meta.appendChild(time);
        group.appendChild(meta);
        area.appendChild(group);

        lastAuthor = m.author;
        lastMsgGroup = group;
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = m.text;
    lastMsgGroup.appendChild(bubble);
}

function listenOnline(roomCode) {
    onlineRef = ref(db, `rooms/${roomCode}/online`);
    onlineListener = onValue(onlineRef, snap => {
        const users = snap.exists() ? Object.values(snap.val()) : [];
        const count = users.length;

        document.getElementById('onlineCount').innerHTML =
            `<div class="online-dot"></div><span>${count} online</span>`;

        const list = document.getElementById('onlineList');
        list.innerHTML = '';
        users.forEach(u => {
            const el = document.createElement('div');
            el.className = 'online-user' + (u.name === currentUser ? ' me' : '');
            el.innerHTML = `<div class="online-user-dot"></div><span class="online-user-name">${u.name}${u.name===currentUser?' (you)':''}</span>`;
            list.appendChild(el);
        });
    });
}

window.sendMessage = async function() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !currentRoom) return;
    input.value = '';

    await push(ref(db, `rooms/${currentRoom}/messages`), {
        author: currentUser,
        text,
        ts: Date.now()
    });

    const area = document.getElementById('messagesArea');
    area.scrollTop = area.scrollHeight;
};

window.leaveRoom = function() {
    if (messagesRef && msgListener) off(messagesRef);
    if (onlineRef && onlineListener) off(onlineRef);
    if (presenceRef) remove(presenceRef);

    messagesRef = null;
    onlineRef = null;
    presenceRef = null;
    currentRoom = null;
    lastAuthor = null;
    lastMsgGroup = null;

    document.getElementById('chatScreen').style.display = 'none';
    document.getElementById('lobby').style.display = 'flex';
    document.getElementById('onlineSidebar').classList.remove('open');
    document.getElementById('messagesArea').innerHTML = '<div class="loading-msg">connecting...</div>';
};

window.toggleSidebar = function() {
    document.getElementById('onlineSidebar').classList.toggle('open');
};

window.copyCode = function() {
    navigator.clipboard.writeText(currentRoom).then(() => showToast('Room code copied!'));
};

</script>
</body>
</html>
